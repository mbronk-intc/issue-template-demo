name: 🐞 Bug report (runtime)
description: Report incorrect behavior of the SDK runtime, an enclave sample at runtime.
title: "[bug] <short summary>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can.
        For build/install failures, use the **Build / install issue** template instead.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - SDK (package, API, libraries)
        - Enclave runtime (uRTS, enclave common)
        - Sample code
        - Tools (sgx_sign, sgx_edger8r, sgx_create_signdata, ...)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SGX release / tag / commit
      description: Output of `git describe --tags --always`, or the release tag (e.g. `sgx_2.27`).
      placeholder: "sgx_2.27 (commit abc1234)"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: OS distribution and version
      placeholder: "Ubuntu 22.04.4 / RHEL 9.4 / Anolis 8 / ..."
    validations:
      required: true

  - type: input
    id: kernel
    attributes:
      label: Kernel version
      description: Output of `uname -r`.
      placeholder: "6.5.0-35-generic"
    validations:
      required: false

  - type: dropdown
    id: hw
    attributes:
      label: SGX hardware mode
      options:
        - HW mode, FLC capable
        - HW mode, non-FLC (legacy)
        - Simulation mode
        - Don't know
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps. Include exact commands.
      placeholder: |
        1. ...
        2. ...
        3. ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the failing SGX status code (e.g. `SGX_ERROR_*`) if any.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: AESM logs (`/var/log/aesmd.log`), dmesg around the failure, app stderr. Redact anything sensitive.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else relevant (workarounds tried, related issues, hypothesis).