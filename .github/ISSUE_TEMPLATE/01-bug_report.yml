name: 🐞 Runtime / API bug
description: A crash or wrong behavior in the SDK libraries, the enclave runtime (uRTS / enclave_common), or a running enclave.
title: "[bug] <short summary>"
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing — fill in what you can; `n/a` is fine. Not sure this is the right form?
        - Build or install failure → **🔨 Build / install issue**.
        - A `SampleCode/` sample → **🧩 Sample-code issue**.
        - A "how do I…" question → the [community forum](https://community.intel.com/t5/Intel-Software-Guard-Extensions/bd-p/software-guard-extensions).

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Trusted (in-enclave) library — tRTS / tlibc / tlibcxx / tcrypto / tseal
        - Untrusted host library / enclave runtime — uRTS / enclave_common
        - Public header / API / EDL
        - Tools (sgx_sign, sgx_edger8r, sgx-gdb, ...)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SGX SDK release / tag / commit
      description: "[Prebuilt Intel binary](https://download.01.org/intel-sgx/sgx-linux/)? The release is enough. Built it yourself? Give the commit (`git describe --tags --always`) and say so."
      placeholder: "sgx_2.27 (commit abc1234)"
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: HW and simulation often behave differently.
      options:
        - Hardware
        - Simulation (SGX_MODE=SIM)
        - Don't know
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: OS and kernel
      placeholder: "Ubuntu 22.04.4, kernel 6.5.0-35-generic"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps + the smallest code / EDL snippet that triggers it. No repro is the #1 reason a bug stalls.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Skip if it's obvious (e.g. "shouldn't crash").

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the SGX status code (`SGX_ERROR_*`); for a crash, a backtrace (`sgx-gdb`) or core dump. Paste text rather than screenshots so it stays searchable.
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Anything else? (logs, links, screenshots)
      description: |
        Drag logs, screenshots, or files straight in, and link related issues (`#123`). Redact secrets. A few things that often help:
        - Memory / threading → `Enclave.config.xml` `HeapMaxSize` / `StackMaxSize` / `TCSNum`.
        - Sealing broke after an upgrade → did the SDK version, CPU, or `MRSIGNER` change?
        - Attestation → DCAP or EPID?
        - Legacy (non-FLC) launch control? Uncommon — mention it.
