name: ✨ Feature request
description: Propose a new capability, API, sample, or workflow improvement.
title: "[feat] <short summary>"
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user-visible problem does this solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: scope
    attributes:
      label: Scope / impact
      description: Which parts of this repo it touches (trusted/untrusted libraries, headers, tools, samples) and any ABI / backward-compat impact. Link related issues (`#123`) or prior discussion.