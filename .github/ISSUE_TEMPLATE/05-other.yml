name: 🗂️ Other
description: Something that doesn't fit the other templates (CI, repo hygiene, governance, dependencies, release process, ...).
title: "[other] <short summary>"
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this only if none of the other templates fit.
        Maintainers may relabel and reassign to a more specific category during triage.

  - type: textarea
    id: summary
    attributes:
      label: What is this about?
      description: One or two sentences on the topic.
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Context, links, repro if applicable, what outcome you'd like.
    validations:
      required: true