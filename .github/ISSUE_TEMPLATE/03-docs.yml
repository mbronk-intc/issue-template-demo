name: 📚 Documentation issue
description: Wrong, missing, or confusing documentation (README, developer reference, header doxygen, wiki link from this repo).
title: "[docs] <short summary>"
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: File path and line, or URL.
      placeholder: "linux/installer/docs/Intel_SGX_Developer_Reference_Linux_*.pdf, p. 42 / README.md L120"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional. A concrete wording or pointer is appreciated.